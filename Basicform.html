<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This is a website about the basics of a form</title>
</head>
<body>
    <form action="index.php" method="POST" enctype="multipart/form-data">
        <label for="Username">Username:</label>
        <input type="text" id="username" placeholder="null" minlength="6" maxlength="10" required><br>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="null" minlength="6" maxlength="10" required><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="null@gmail.com"><br>
        
        <label for="phone">Phonenumber:</label>
        <input type="phone" id="phone" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"><br>
        
        <label for="birthday">Birthdate:</label>
        <input type="date" id="birthday" ><br>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" placeholder="..." min="0" max="99" value="1"><br>

        <label for="Mr.">Mr.</label>
        <input type="radio" id="Mr." value="Mr." name="title">

        <label for="Ms.">Ms.</label>
        <input type="radio" id="Ms." value="Ms." name="title">

        <label for="radio">PhD.</label>
        <input type="radio" id="PhD." value="PhD." name="title"><br>
        
        <label for="payment">Payment</label>
        <select id="payment">
            <option value="visa/mastercard">Visa / Mastercard</option>
            <option value="credit card">Credit card</option>
            <option value="cash">In cash</option>
        </select><br>
        
        <label for="subcribe">Subscription for the website?</label>
        <input type="checkbox" id="subscribe"><br>

        <label for="comment">Leave a comment about me!</label>
        <textarea id="comment" rows="3" columns="25"></textarea><br>

        <label for="file">Submit file:</label>
        <input type="file" id="file" accept="image/png, image/jpeg"><br>
        
        <input type="reset"><br>
        <input type="submit"><br>
    </form>
</body>
</html>
